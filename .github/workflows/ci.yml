name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run math engine tests
        run: python -m pytest backend/test_math_engine.py -v
        env:
          POLYMARKET_PRIVATE_KEY: "0x_test_placeholder"
          POLYMARKET_FUNDER_ADDRESS: "0x_test_placeholder"

      - name: Run validator tests
        run: python -m pytest backend/test_validator.py -v
        env:
          POLYMARKET_PRIVATE_KEY: "0x_test_placeholder"
          POLYMARKET_FUNDER_ADDRESS: "0x_test_placeholder"

      - name: Run risk manager tests
        run: python -m pytest backend/test_risk_manager.py -v
        env:
          POLYMARKET_PRIVATE_KEY: "0x_test_placeholder"
          POLYMARKET_FUNDER_ADDRESS: "0x_test_placeholder"
